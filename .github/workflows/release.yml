name: release

# Runs on GitHub when a v* tag is pushed (the GitLab release job mirrors tags
# here). Builds the Chrome package and publishes a GitHub Release with it.
# Uses the built-in GITHUB_TOKEN — no secrets to configure or rotate.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build Chrome package
        env:
          ELS_API_KEY: ${{ secrets.ELS_API_KEY }}
        run: |
          npm run build:chrome
          npm run zip:chrome

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: builds/opfs-studio-chrome.zip
