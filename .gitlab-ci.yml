stages:
  - verify
  - publish

# ─── verify ──────────────────────────────────────────────────────────────────
# Type-check + extension build for every branch and every MR.
# Runs on the instance docker-executor runner (tag: docker).

verify:typecheck-build:
  stage: verify
  image: node:20-alpine
  tags: [docker]
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'
  before_script:
    - apk add --no-cache git
  script:
    - npm ci --no-audit --no-fund
    - npx tsc --noEmit
    - npm run build:chrome

# ─── publish ─────────────────────────────────────────────────────────────────
# Mirror main → github.com/official-inso/opfs-studio after a successful verify.
# Runs in an alpine container on the docker-executor runner. Auth is an SSH
# deploy key (MIRROR_SSH_KEY, File-type CI variable) — it does not expire.

mirror:github:
  stage: publish
  image: alpine:3.20
  tags: [docker]
  needs:
    - job: verify:typecheck-build
      optional: false
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: on_success
  variables:
    GIT_DEPTH: 0
  before_script:
    - apk add --no-cache git bash openssh-client
  script:
    - bash scripts/ci/mirror-to-github.sh
